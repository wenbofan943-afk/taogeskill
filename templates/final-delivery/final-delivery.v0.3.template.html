<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} - 发布执行工作台</title>
  <style>
    :root { color-scheme: light; --ink:#172026; --muted:#5e6a71; --line:#d8dee3; --soft:#f5f7f8; --accent:#0f766e; --warn:#9a3412; --ok:#166534; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif; color:var(--ink); background:#fff; line-height:1.65; }
    main { max-width:1040px; margin:0 auto; padding:28px 20px 56px; }
    h1 { margin:0 0 12px; font-size:30px; line-height:1.25; }
    h2 { margin:34px 0 14px; font-size:23px; }
    h3 { margin:0 0 8px; font-size:18px; }
    p { margin:6px 0; }
    .banner { border-left:4px solid var(--accent); border-radius:8px; background:#eef8f6; padding:12px 14px; margin:10px 0; }
    .banner.warn { border-left-color:var(--warn); background:#fff7ed; }
    .banner.ok { border-left-color:var(--ok); background:#f0fdf4; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; }
    .delivery-list { grid-template-columns:1fr; }
    .card { border:1px solid var(--line); border-radius:12px; padding:14px; background:var(--soft); min-width:0; }
    .platform-card { display:grid; grid-template-columns:minmax(150px,0.8fr) minmax(240px,1.2fr); gap:14px; }
    .pip-card { display:grid; grid-template-columns:minmax(240px,0.9fr) minmax(260px,1.1fr); gap:14px; }
    .label { display:block; color:var(--muted); font-size:12px; margin-top:8px; }
    .value { white-space:pre-wrap; word-break:break-word; }
    .copy-field { width:100%; min-height:44px; resize:vertical; white-space:pre-wrap; word-break:break-word; border:1px solid var(--line); border-radius:8px; background:#fff; padding:10px; color:var(--ink); font:inherit; }
    .script-field { min-height:520px; }
    img { width:100%; height:auto; display:block; border:1px solid var(--line); border-radius:10px; background:#e5e7eb; }
    a { color:var(--accent); }
    .download { display:inline-block; margin-top:8px; font-weight:600; }
    .warning-list { display:grid; gap:10px; }
    .warning-item { border-left:3px solid var(--warn); background:#fff; border-radius:6px; padding:10px 12px; }
    details { margin-top:12px; border:1px solid var(--line); border-radius:10px; background:#f8fafc; }
    summary { cursor:pointer; padding:11px 13px; font-weight:700; color:var(--muted); }
    .details-body { padding:0 13px 13px; }
    code { white-space:pre-wrap; word-break:break-word; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; }
    .action { border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--soft); }
    @media (max-width:700px) {
      main { padding:20px 14px 40px; }
      h1 { font-size:25px; }
      .platform-card,.pip-card { grid-template-columns:1fr; }
      .script-field { min-height:420px; }
    }
  </style>
</head>
<body>
<main data-template-id="final_delivery_workbench" data-template-version="0.3.0">
  <header>
    <h1>{{title}}</h1>
    {{readiness_banner}}
    {{provenance_banner}}
    <div class="banner">本页用于人工验收、复制物料、下载图片和指导剪辑；不会登录平台或自动发布。</div>
  </header>

  <section id="topic-summary">
    <h2>这篇内容</h2>
    {{topic_summary}}
    {{duration_summary}}
  </section>

  <section id="script">
    <h2>正式口播</h2>
    <span class="label">选中文本后复制</span>
    <textarea class="copy-field script-field" readonly>{{script_text}}</textarea>
  </section>

  <section id="platform-delivery">
    <h2>按平台发布</h2>
    <div class="grid delivery-list">{{platform_units}}</div>
  </section>

  <section id="pip-delivery">
    <h2>画中画剪辑单</h2>
    <div class="grid delivery-list">{{pip_cards}}</div>
  </section>

  <section id="warnings">
    <h2>发布前提醒</h2>
    <div class="warning-list">{{warning_items}}</div>
  </section>

  <section id="actions">
    <h2>下一步</h2>
    <div class="actions">{{action_cards}}</div>
  </section>

  <section id="audit">
    <h2>追溯与运行证据</h2>
    <details>
      <summary>展开技术详情</summary>
      <div class="details-body">
        {{audit_meta}}
        <div class="grid">{{trace_links}}</div>
      </div>
    </details>
  </section>
</main>
</body>
</html>
