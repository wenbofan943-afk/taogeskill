  surface_role: feed_cover
  profile_evidence_status: provisional_not_verified
  adaptation_strategy: fit_pad
  preview_evidence_type: deterministic_surface_mock
visual_insert:
  presentation_mode: speaker_plus_visual
  platform_surface_profile_id: douyin-video-9x16-v0.1
  video_canvas:
    width_px: 1080
    height_px: 1920
    ratio_width: 9
    ratio_height: 16
  placement:
    x: 0.08
    y: 0.20
    width: 0.84
actions:
  select_topic:
    label: 选择该选题
    instruction: 只记录当前面板中的一个选题，不改变排序、证据或事实状态。
    reply_example: 选择 TOPIC-001
  rerun_hotspot_research:
    label: 同策略重找
    instruction: 沿用当前账号与雷达策略，新建研究请求和研究集。
    reply_example: 同策略重找一轮
  broaden_hotspot_scope:
    label: 账号边界内放宽
    instruction: 明确放宽范围，但不得突破账号禁区。
    reply_example: 放宽到相关行业机制
  attach_manual_hotspot_source:
    label: 加入人工来源
    instruction: 先登记来源输入集，再触发新的研究请求。
    reply_example: 使用已登记来源集
  branch_selected_topics:
    label: 多选并拆分
    instruction: 交给既有 R2 分支请求，不在单篇 session 内合并或自动并行。
    reply_example: 选择 TOPIC-001 和 TOPIC-002
  publish_primary_manually:
    label: 人工发布主平台
    instruction: 使用已验收封面、口播稿和视觉插入点，由用户自行发布。
    reply_example: 记录主平台发布结果
  revise_copy:
    label: 局部返工文案
    instruction: 指出要改的原句和目标，只重跑受影响节点、质检和交付 revision。
    reply_example: 修改指定原句
  revise_visual:
    label: 局部返工视觉
    instruction: 只重跑指定视觉任务和受影响的对齐、交付节点。
    reply_example: 重做指定画中画
source_context:
  required_source_types_by_origin:
    user_supplied_draft: [direct_content_intake, content_brief, short_video_structure_plan, draft, content_beat_map]
    hotspot_selected_topic: [hotspot_research_request, hotspot_research_set, topic_selection_panel, topic_selection_decision, selected_topic_source, content_brief, short_video_structure_plan, draft, content_beat_map]
  hotspot_delivery_contract_status: pending_h6b_typed_components_v0.7
