schema_version: "0.1"
status: active_governance_contract
owner: agent-orchestration
description: >
  Machine-readable architecture boundaries for separating product behavior,
  deterministic workflow control, immutable run facts, evaluation, and
  project-level AI governance. Presence of this file does not certify L3.

current_baseline:
  project_maturity: L2_8
  deterministic_control_plane_authority: partial
  workflow_ir_codegen: m5_1_compatibility_directory_archive_compiled
  workflow_ir_parity: pass_m1_static_m2_direct_16_of_16_m3_hotspot_21_of_21_m4_entry_19_of_19_and_m5_isolation_16_of_16
  runtime_certification: not_run_m6_runtime_conformance_suite_compiled
  evaluation_certification: previous_clean_head_certification_superseded_by_runtime_suite_recompile
  frontend_hard_budget_enforcement: not_available
  required_reads_runtime_enforcement: partial_route_checker_only
  project_level_hook_enforcement: not_configured
  root_agents_compaction: pending_scoped_migration

target:
  maturity: L3_candidate
  certification_policy: evidence_bound_no_self_claim

governance_baseline_decision:
  architecture_change_id: ARCH-20260718-001
  decision_status: completed_governance_scope

current_decision:
  architecture_change_id: ARCH-20260718-002
  decision_status: confirmed
  decision_document: docs/governance/agent-orchestration/workflow-kernel-simplification.md
  selected_option: lightweight_local_kernel_with_single_workflow_ir
  current_runtime_switch_authorized: true
  m1_static_compile_authorized: true
  m1_status: completed
  m1_runtime_switch: not_performed
  m2_direct_shadow_runtime_authorized: true
  m2_status: completed
  m2_runtime_switch: not_performed
  m3_hotspot_shadow_runtime_authorized: true
  m3_status: completed
  m3_runtime_switch: not_performed
  m4_new_session_switch_authorized: true
  m4_status: completed
  m4_switch_scope: future_new_sessions_only
  m4_existing_session_migration: forbidden
  m4_runtime_certification: not_run
  m5_compatibility_isolation_authorized: true
  m5_status: completed
  m5_current_hot_path_legacy_projection: forbidden
  m5_legacy_load_authority: tools/WorkflowCompatibilityLoader.ps1
  m5_1_directory_archive_authorized: true
  m5_1_status: completed
  m5_1_compatibility_root: compatibility/legacy-r7
  m5_runtime_certification: not_run
  m6_independent_certification_authorized: true
  m6_status: runtime_conformance_suite_compiled_not_certified
  m6_contract: routes/m6-certification-contract.json
  phase_a_compatibility_entry: windows_powershell_5_1
  workflow_ir_format: json
  external_workflow_engine_selected: false
  current_top_level_stage_count_target: 7
  migration_strategy: shadow_then_strangler

planes:
  product:
    owner_route: product_definition
    write_authority: confirmed_product_contract
  control:
    owner_route: architecture_definition
    write_authority: deterministic_coordinator_only
  work:
    owner_route: skill_compile
    write_authority: declared_typed_output_only
  data:
    owner_route: architecture_definition
    source_of_truth: append_only_event_and_immutable_artifact
    derived_surfaces:
      - projection
      - manifest_summary
      - resume_summary
      - status_display
  evaluation:
    owner_route: evaluation_certification
    write_authority: versioned_evaluator_only
  governance:
    owner_route: docs_governance
    write_authority: routing_permission_budget_and_gate_only

architecture_trigger:
  cross_route_threshold: 2
  invariant_kinds:
    - lifecycle_transition
    - event_or_projection
    - checkpoint_or_resume
    - external_side_effect
    - contract_version_migration
    - evaluation_harness
    - shared_runtime

contract_target:
  canonical_machine_source: versioned_workflow_ir
  generated_or_checked_surfaces:
    - schema
    - registry
    - typed_adapter_skeleton
    - fixture_catalog_skeleton
    - checker_contract
    - documentation_field_table
  current_transition_policy: explicit_architecture_change_id_and_parity_checker
  manual_six_layer_sync_eliminated: false

current_machine_truths:
  workflow_ir: routes/current-workflow-ir.json
  component_catalog: routes/component-catalog.json
  compatibility_catalog: routes/compatibility-catalog.json
  static_compiler: tools/compile-workflow-ir.ps1
  parity_checker: tools/validate-workflow-ir-m1.ps1
  direct_shadow_runtime: tools/WorkflowKernelRuntime.ps1
  direct_shadow_cli: tools/invoke-workflow-kernel-shadow.ps1
  direct_shadow_validator: tools/validate-workflow-kernel-m2.ps1
  direct_shadow_fixture: examples/workflow-kernel-m2-direct-shadow-fixtures/baseline-request.json
  direct_shadow_report: state/checks/workflow-kernel-m2-fixture-report.json
  hotspot_shadow_runtime: tools/WorkflowKernelHotspotRuntime.ps1
  hotspot_shadow_cli: tools/invoke-workflow-kernel-shadow.ps1
  hotspot_shadow_validator: tools/validate-workflow-kernel-m3.ps1
  hotspot_shadow_fixture: examples/workflow-kernel-m3-hotspot-shadow-fixtures/fixtures.json
  hotspot_shadow_report: state/checks/workflow-kernel-m3-fixture-report.json
  session_entry_runtime: tools/WorkflowKernelSessionEntry.ps1
  session_entry_cli: tools/invoke-workflow-session-entry.ps1
  session_entry_validator: tools/validate-workflow-kernel-m4.ps1
  session_entry_fixture: examples/workflow-kernel-m4-session-switch-fixtures/fixtures.json
  session_entry_report: state/checks/workflow-kernel-m4-fixture-report.json
  compatibility_loader: tools/WorkflowCompatibilityLoader.ps1
  compatibility_isolation_validator: tools/validate-workflow-kernel-m5.ps1
  compatibility_isolation_fixture: examples/workflow-kernel-m5-compatibility-fixtures/fixtures.json
  compatibility_isolation_report: state/checks/workflow-kernel-m5-fixture-report.json
  m6_certification_contract: routes/m6-certification-contract.json
  m6_freeze_runtime: tools/M6CertificationRuntime.ps1
  m6_freeze_entry: tools/invoke-m6-certification-freeze.ps1
  m6_evaluator_conformance_validator: tools/validate-m6-evaluator-conformance.ps1
  m6_evaluator_fixture_catalog: examples/m6-evaluator-conformance-fixtures/catalog.json
  m6_evaluator_report: state/checks/m6/evaluator-conformance-report.json
  m6_runtime_conformance_validator: tools/validate-m6-runtime-conformance.ps1
  m6_runtime_fixture_catalog: examples/m6-runtime-conformance-fixtures/catalog.json
  m6_runtime_report: state/checks/m6/runtime-conformance-report.json
  generated_view_root: state/checks/workflow-kernel-m1/current/
  generated_views_are_source_of_truth: false

migration:
  M0:
    status: completed
    result: r7_current_expansion_frozen_and_superseded_docs_archived
  M1:
    status: completed
    result: three_machine_truths_static_compiler_and_parity_fixtures_pass
    runtime_switch: not_performed
  M2:
    status: completed
    scope: direct_shadow_runtime
    result: pass_16_of_16_artifact_event_stop_reason_final_html_parity
    execution_scope: direct_positive_path_to_final_human_wait
    intermediate_wait_recovery: not_compiled_fail_closed
    comparison_baseline_kind: frozen_legacy_contract_fixture
    real_legacy_runtime_executed: false
    runtime_switch: not_performed
  M3:
    status: completed
    scope: hotspot_shadow_runtime
    result: pass_21_of_21_wait_resume_reconcile_topic_gate_freshness_reversal_and_failed_replay
    execution_scope: hotspot_positive_wait_resume_freshness_and_reversal
    external_activity_protocol: request_attempt_outcome_output_reference_acceptance
    external_retry_count: 0
    comparison_baseline_kind: frozen_legacy_contract_fixture_plus_contract_branches
    real_legacy_runtime_executed: false
    runtime_switch: not_performed
  M4:
    status: completed
    scope: new_session_switch
    result: pass_19_of_19_new_current_legacy_resume_rollback_and_false_success
    default_new_session_generation: kernel_v1_current
    existing_session_policy: generation_pinned_no_in_place_migration
    rollback_scope: future_new_sessions_only
    runtime_certification: not_run
    archived_tracked_assets: 0
    archive_deferral_reason: legacy_runtime_and_shadow_gate_consumers_still_active
  M5:
    status: completed
    scope: compatibility_isolation
    result: pass_16_of_16_current_hot_path_isolated_legacy_resume_read_only
    current_ir_legacy_projection: removed
    current_component_legacy_projection: removed
    new_current_binding_schema: session_runtime_binding_v0.2_without_compatibility_digest
    legacy_load_authority: tools/WorkflowCompatibilityLoader.ps1
    historical_blueprint_count: 12
    retained_compatibility_asset_count: 17
    directory_archived_data_assets: 15
    directory_archived_implementations: 2
    stable_legacy_shims: 2
    compatibility_root: compatibility/legacy-r7
    retired_or_deleted_assets: 0
    retirement_deferral_reason: active_legacy_resume_and_replay_consumers
    runtime_certification: not_run
  M6:
    status: runtime_conformance_suite_compiled_not_certified
    scope: independent_certification
    freeze_category_count: 5
    evaluator_conformance_compile_smoke: pass_20_of_20_plus_2_of_2_negative
    previous_evaluator_certification: pass_on_30be209_superseded_by_runtime_suite_recompile
    evaluator_certification: pending_same_digest_recertification
    runtime_conformance_compile: compiled_20_assertions_4_negative_cases
    runtime_certification: not_run
    direct_same_digest_certification: not_run
    hotspot_same_digest_certification: not_run

runtime_invariants:
  state_advancer: deterministic_coordinator_only
  semantic_worker_state_mutation: forbidden
  projection_is_source_of_truth: false
  side_effect_protocol: request_attempt_outcome_output_reference_acceptance
  resume_policy: reuse_persisted_outcome_before_retry

certification:
  product_contract_freeze: required
  architecture_decision_freeze: required
  runtime_build_freeze: required
  evaluator_build_freeze: required
  fixture_catalog_freeze: required
  evaluator_self_certification_before_business_eval: required
  mutate_subject_during_certification: invalidates_certification
  mutate_evaluator_during_evaluation: invalidates_evaluation

rule_promotion:
  sequence:
    - incident_evidence
    - failure_fingerprint
    - root_cause_class
    - reusable_invariant
    - mechanical_gate
    - scoped_documentation
    - root_pointer_if_required
  one_machine_source_per_invariant: required
  incident_specific_root_rule: forbidden
  required_metadata:
    - scope
    - owner
    - verifier
    - source_incident
    - retirement_or_review_trigger

verifier:
  command: tools/validate-architecture-control.ps1
  required_indexes:
    - AGENTS.md
    - PROJECT_MAP.md
    - docs/README.md
    - docs/governance/README.md
    - docs/governance/agent-orchestration/README.md
    - routes/README.md
    - tools/README.md
