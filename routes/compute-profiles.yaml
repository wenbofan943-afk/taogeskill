schema_version: 0.1
status: stable
owner: agent-orchestration
description: Machine-readable model, reasoning, and speed routing for Codex tasks.

defaults:
  profile: content_standard
  speed_policy: normal
  fast_requires: explicit_urgency_or_user_choice
  explicit_runtime_selection_precedence: true
  unavailable_profile_action: continue_with_current_and_log_fallback

profiles:
  content_standard:
    role: content_operator
    model: gpt-5.6-terra
    reasoning_effort: medium
    speed_policy: normal
    purpose: normal content production, onboarding, revision, and multi-branch runs

  product_deep:
    role: product_architect
    model: gpt-5.6-sol
    reasoning_effort: high
    speed_policy: normal
    purpose: product definition, dependency research, and issue diagnosis

  compile_deep:
    role: skill_compiler
    model: gpt-5.6-sol
    reasoning_effort: high
    speed_policy: normal
    purpose: Skill compilation, checker development, and governance compilation

  release_critical:
    role: release_auditor
    model: gpt-5.6-sol
    reasoning_effort: xhigh
    preferred_reasoning_effort_when_supported: max
    speed_policy: normal
    purpose: release, privacy, source-boundary, and final regression audits

  operations_standard:
    role: content_operator
    model: gpt-5.6-terra
    reasoning_effort: medium
    speed_policy: normal
    purpose: testing, repository maintenance, and package construction

  mechanical_light:
    role: maintenance_operator
    model: gpt-5.6-luna
    reasoning_effort: low
    speed_policy: normal
    purpose: bounded indexing, support-log export, and deterministic maintenance

speed_overrides:
  fast:
    service_tier: fast
    changes_model: false
    changes_reasoning_effort: false
    default_enabled: false
    activation_rule: use only for explicit urgency or an explicit user selection
    fallback: normal
