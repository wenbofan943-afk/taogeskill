schema_version: 0.2
status: stable
owner: agent-orchestration
description: >
  Machine-readable workflow route map. This file is the next layer after
  docs/governance/agent-orchestration/required-reads.yaml and is intended
  to become the validator-readable task routing source.

defaults:
  project_root: "."
  project_map: PROJECT_MAP.md
  agent_rules: AGENTS.md
  state_index: state/current-state.yaml
  legacy_state_record: 工作流状态记录.md
  field_dictionary: 交接物字段词典.md

routes:
  content_run:
    intent_examples:
      - 做一篇内容
      - 跑生产逻辑
      - 给这个账号做内容
    build_profile: dev
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - state/current-state.yaml
      - 工作流状态记录.md
      - 交接物字段词典.md
      - skills/propagation-router/SKILL.md
      - docs/product/R5-账号视觉身份与二手车优先热点雷达.md
    gates:
      - human_account_confirm
      - account_startup_gate
      - human_topic_select
      - field_gate
      - final_delivery_regression_gate
    writes:
      - accounts/{account_slug}/runs/{session_id}/
      - 工作流状态记录.md
    next_default: route_by_propagation_router
    after_completion:
      auto_continue_allowed: true
      on_success: "选题确认后自动跑到最终 HTML；最终验收时给局部返工、导出、发布记录和归档选项。"
      on_waiting_human: "只在换账号确认、候选选题选择、最终 HTML 验收或高风险质检时停下，并说明为什么需要人判断。"
      on_blocked: "说明缺少的账号 / 产品 / 字段 / 图片能力 / 质检项，写回状态后给恢复路线。"
      suggested_user_replies:
        - "认可"
        - "选 Txxxx"
        - "只改前 5 秒"
        - "导出转交包"

  account_onboarding:
    intent_examples:
      - 新建账号
      - 没有账号
      - 新增账号
    build_profile: dev
    required_reads:
      - skills/account-onboarding/SKILL.md
      - docs/reference/账号档案完整性检查表.md
    gates:
      - human_account_confirm
    writes:
      - accounts/{account_slug}/account_profile.md
      - accounts/{account_slug}/README.md
      - accounts/{account_slug}/index.md
    after_completion:
      auto_continue_allowed: true
      on_success: "给账号档案摘要，用户认可后自动回到产品 / 活动对象检查和内容路由。"
      on_waiting_human: "让用户确认账号画像是否符合当前经营状态，避免串号或旧档案偏移。"
      on_blocked: "说明还缺哪 1-3 个最小账号信息，不让用户填写字段表。"
      suggested_user_replies:
        - "认可，就按这个账号做"
        - "账号有变化，我补充一下"
        - "换另一个账号"

  resume_run:
    intent_examples:
      - 继续
      - 接着上次
      - 活了吗
      - 断点续跑
    build_profile: dev
    required_reads:
      - state/current-state.yaml
      - 工作流状态记录.md
      - docs/reference/R2-运行模型执行规范.md
      - docs/governance/agent-orchestration/state-and-gates.md
    gates:
      - state_consistency_gate
    writes:
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: true
      on_success: "说明从哪个 session、哪个 artifact、哪个 checkpoint 恢复，并继续到下一可执行动作。"
      on_waiting_human: "多条 run 匹配时列出 2-5 个候选，让用户按账号、选题或时间选择。"
      on_blocked: "说明状态冲突来源，以 manifest 为准修正或进入 support log / issue_triage。"
      suggested_user_replies:
        - "继续最近这条"
        - "选第 1 条"
        - "导出这条日志"

  multi_branch_run:
    intent_examples:
      - 三篇都做
      - 这几个选题都跑
      - 多个一起做
    build_profile: dev
    required_reads:
      - docs/reference/R2-运行模型执行规范.md
      - docs/governance/agent-orchestration/state-and-gates.md
      - 工作流状态记录.md
    gates:
      - branch_lock_gate
      - fan_in_gate
    writes:
      - accounts/{account_slug}/runs/{parent_session_id}/
      - accounts/{account_slug}/runs/{child_session_id}/
    after_completion:
      auto_continue_allowed: true
      on_success: "说明 parent / child session 已拆好，逐条独立推进，并在 fan-in 时汇总结果。"
      on_waiting_human: "只有分支范围变化或 fan-in 取舍需要用户判断时停下。"
      on_blocked: "说明 branch_lock、child session 或 checkpoint 缺口，禁止把多篇塞进单条链路。"
      suggested_user_replies:
        - "三条都继续"
        - "先做第 1 条"
        - "停止第 3 条"

  revision_run:
    intent_examples:
      - 改文案
      - 加画中画
      - 改标题
      - 导出转交包
    build_profile: dev
    required_reads:
      - state/current-state.yaml
      - docs/governance/agent-orchestration/state-and-gates.md
      - accounts/{account_slug}/runs/{session_id}/manifest.yaml
    gates:
      - revision_scope_gate
      - final_delivery_regression_gate
    writes:
      - accounts/{account_slug}/runs/{session_id}/intermediate/
      - accounts/{account_slug}/runs/{session_id}/deliverables/
    after_completion:
      auto_continue_allowed: true
      on_success: "局部返工完成后自动重建 final-delivery.html，并引导二次验收。"
      on_waiting_human: "返工范围不清时，让用户用自然语言指定要改的部位。"
      on_blocked: "说明缺少原始 session、HTML、图片或上游交接物，并给恢复或重跑路径。"
      suggested_user_replies:
        - "只改抖音标题"
        - "回到口播改前 5 秒"
        - "再加 1 张画中画"
        - "记录为已确认"

  product_definition:
    intent_examples:
      - 产品开发
      - 继续 R1
      - 继续 P1-P5
      - 设计产品
    build_profile: dev
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - docs/product/GitHub开源上线前Workflow修复路线图.md
      - docs/governance/agent-orchestration/task-routing.md
    gates:
      - human_product_confirm
      - field_gate
    writes:
      - docs/product/
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "给产品定义结果、取舍依据、字段影响和是否可进入 skill 编译的判断。"
      on_waiting_human: "进入 skill 编译前必须请用户认可产品定义，不能替用户拍板。"
      on_blocked: "说明缺少调研依据、字段契约、承载文档或路线图位置。"
      suggested_user_replies:
        - "认可，进入 skill 编译"
        - "先补产品层颗粒度"
        - "给我看冲突点"

  skill_compile:
    intent_examples:
      - skill 编译
      - 代码开发
      - 进入开发
    build_profile: dev
    required_reads:
      - 交接物字段词典.md
      - docs/product/GitHub开源上线前Workflow修复路线图.md
      - docs/reference/skill_contract模板.md
      - docs/governance/agent-orchestration/state-and-gates.md
      - docs/product/R4-开源交付与净化规则.md
      - docs/product/R5-账号视觉身份与二手车优先热点雷达.md
    gates:
      - product_confirmed_gate
      - field_gate
      - contract_data_flow_gate
      - product_contract_compilation_gate
      - runtime_smoke_gate
      - account_startup_gate
      - environment_compatibility_gate
      - local_commit_gate
    writes:
      - skills/
      - tools/
      - templates/
      - examples/
      - docs/reference/
      - 交接物字段词典.md
      - README.md
      - PROJECT_MAP.md
      - AGENTS.md
      - STATUS.md
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "说明编译了哪些 skill / tools、字段门禁、dry-run 或静态检查结果，以及本地 commit 和小扫地结果；不自动推送。"
      on_waiting_human: "只有产品未确认、改动无法从混合工作区安全隔离或需要远端写入时停下，并说明原因。"
      on_blocked: "字段、合同、模板或 checker 不一致时，回到产品 / 字段修订。"
      suggested_user_replies:
        - "可以测试"
        - "继续修字段不一致"
        - "给我看本轮 commit"

  test_run:
    intent_examples:
      - 测试
      - dry-run
      - 跑 sample
      - Windows 环境兼容性测试
    build_profile: test
    required_reads:
      - routes/build-profiles.yaml
      - tools/README.md
      - examples/README.md
      - docs/product/R4-开源交付与净化规则.md
      - docs/governance/agent-orchestration/state-and-gates.md
    gates:
      - sample_only_gate
      - environment_safety_gate
      - environment_compatibility_gate
    writes:
      - examples/
      - docs/tutorials/
      - state/checks/
    after_completion:
      auto_continue_allowed: true
      on_success: "给测试矩阵、逐轴 pass/fail/not_tested、样例产物、失败项和可复现日志位置，并进入问题归因。"
      on_waiting_human: "测试范围扩大到真实账号、系统级配置修改、远端写入或需要改变公开支持口径前必须停下确认。"
      on_blocked: "说明样例缺失、checker 失败或环境能力不足，并给降级验证路径。"
      suggested_user_replies:
        - "修测试暴露的问题"
        - "只看失败项"
        - "构建测试包"

  github_release:
    intent_examples:
      - 发版
      - GitHub 发布
      - 构建公开包
    build_profile: public
    required_reads:
      - routes/build-profiles.yaml
      - docs/governance/agent-orchestration/state-and-gates.md
      - release-checklist.md
      - RELEASE_NOTES.md
      - tools/validate-release-gate.ps1
    gates:
      - public_privacy_gate
      - archive_integrity_gate
      - environment_compatibility_gate
      - path_preflight_gate
      - remote_release_gate
      - human_release_approval
    writes:
      - releases/v{version}/
      - CHANGELOG.md
      - RELEASE_NOTES.md
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "给 Release URL、tag、commit、asset、sha256、页面审计和本地小扫地结果。"
      on_waiting_human: "push / tag / Release / repo metadata 等远端写入前必须得到明确授权；release commit 可在已授权发版流程中按本地闭环创建。"
      on_blocked: "说明 token、隐私、Actions、tag、source zip、archive integrity、环境矩阵或 asset 的阻断点。"
      suggested_user_replies:
        - "确认发版"
        - "只构建本地公开包"
        - "先修 Actions"
        - "暂停发布"

  dependency_research:
    intent_examples:
      - 调研成熟项目
      - 对标 dbskill
      - 看看别人怎么做
      - 方法论研究
    build_profile: dev
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - docs/governance/agent-orchestration/task-routing.md
      - docs/reference/文档治理与目录规范.md
    gates:
      - source_quality_gate
      - citation_gate
    writes:
      - docs/explanation/
      - docs/product/
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "输出成熟项目做法、我们的差距、取舍建议和建议落点。"
      on_waiting_human: "进入修订前给推荐方案，等待用户认可范围。"
      on_blocked: "说明来源不足、结论不稳或缺少项目内承载文档。"
      suggested_user_replies:
        - "按推荐方案修订"
        - "只沉淀调研，不改文件"
        - "再对标 dbskill"

  privacy_audit:
    intent_examples:
      - 查一下有没有污染
      - 隐私审计
      - 真实账号有没有混进去
      - source zip 审计
      - token 有没有问题
    build_profile: public
    required_reads:
      - routes/build-profiles.yaml
      - docs/governance/agent-orchestration/build-profiles.md
      - SECURITY.md
      - tools/validate-public-release.ps1
      - tools/validate-release-gate.ps1
    gates:
      - public_privacy_gate
      - source_zip_gate
      - token_scope_gate
    writes:
      - releases/v{version}/
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "说明扫描范围、命中结果、source zip / release zip 边界和是否可发布。"
      on_waiting_human: "命中疑似真实信息时停下，让用户决定删除、脱敏或保留为私有。"
      on_blocked: "隐私命中即阻断 public / GitHub release，并给修复路径。"
      suggested_user_replies:
        - "删除真实样例"
        - "脱敏后继续"
        - "只保留本地私有"

  repo_maintenance:
    intent_examples:
      - git 对齐
      - tag 冲突吗
      - Actions 红了吗
      - 本地远端一致吗
      - GitHub 页面有没有问题
    build_profile: dev
    required_reads:
      - docs/governance/agent-orchestration/state-and-gates.md
      - docs/reference/版本治理与Git边界.md
      - release-checklist.md
    gates:
      - clean_worktree_gate
      - remote_state_gate
      - tag_semantics_gate
      - github_actions_gate
      - git_publish_gate
    writes:
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "说明本地、远端、tag、Actions、Release 页面是否一致；默认只报告不写远端。"
      on_waiting_human: "push / tag / Release / API 等远端写入前要求用户明确授权；用户单独说‘提交’只授权本地提交闭环。"
      on_blocked: "说明 dirty worktree、远端分叉、tag 语义或 Actions 失败点。"
      suggested_user_replies:
        - "只本地修，不提交"
        - "确认提交并推送"
        - "先看 diff"

  package_distribution:
    intent_examples:
      - 构建测试包
      - 给别人测试的包
      - 离线包
      - 外部 tester 包
    build_profile: test
    required_reads:
      - routes/build-profiles.yaml
      - INSTALL.md
      - UPDATE.md
      - docs/how-to/export-support-log.md
      - tools/README.md
    gates:
      - sample_only_gate
      - package_manifest_gate
      - support_log_instruction_gate
    writes:
      - offline_tester_packages/
      - releases/v{version}/
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "给测试包位置、包内入口、反馈日志说明和已排除真实数据说明。"
      on_waiting_human: "包范围、是否公开、是否含内容细节不清时停下确认。"
      on_blocked: "说明包 manifest、隐私边界或 support log 指引缺失。"
      suggested_user_replies:
        - "确认这个包可发给测试者"
        - "重新构建脱敏包"
        - "先看包结构"

  issue_triage:
    intent_examples:
      - 用户反馈
      - issue 处理
      - 把反馈沉淀成问题包
      - 改版问题
    build_profile: dev
    required_reads:
      - docs/how-to/export-support-log.md
      - docs/explanation/工作流问题包与产品设计草案-20260706.md
      - docs/product/GitHub开源上线前Workflow修复路线图.md
      - support-logs/
    gates:
      - content_detail_permission_gate
      - issue_classification_gate
      - product_backlog_gate
    writes:
      - docs/product/
      - docs/explanation/
      - 工作流状态记录.md
    after_completion:
      auto_continue_allowed: false
      on_success: "给问题分类、原因、影响范围、建议进入产品 / skill / 文档 / 发版哪条线。"
      on_waiting_human: "读取内容细节、纳入路线图或进入修复前停下确认。"
      on_blocked: "缺少日志或复现信息时，引导用户按账号 / 选题导出反馈日志。"
      suggested_user_replies:
        - "沉淀进路线图"
        - "进入产品修订"
        - "先导出日志"

  support_log:
    intent_examples:
      - 导出日志
      - 反馈日志
      - 不好用
    build_profile: dev
    required_reads:
      - docs/how-to/export-support-log.md
      - tools/export-support-log.ps1
    gates:
      - content_detail_permission_gate
    writes:
      - support-logs/
    after_completion:
      auto_continue_allowed: true
      on_success: "给 support log zip 位置，并说明默认是否包含内容细节。"
      on_waiting_human: "只有需要包含文案、Brief、图片提示词等内容细节时才询问授权。"
      on_blocked: "找不到唯一 run 时，按账号、选题、时间列候选让用户选。"
      suggested_user_replies:
        - "导出最近这条"
        - "可以包含内容细节"
        - "只导出日志，不含正文"

  docs_governance:
    intent_examples:
      - 文档治理
      - 目录治理
      - 文件太散
      - AI 驾驭工程编排
    build_profile: dev
    required_reads:
      - docs/README.md
      - docs/reference/文档治理与目录规范.md
      - docs/governance/agent-orchestration/README.md
      - docs/product/README.md
      - docs/reference/README.md
      - PROJECT_MAP.md
    gates:
      - link_check_gate
      - root_cleanliness_gate
      - document_graph_gate
      - local_commit_gate
    writes:
      - docs/README.md
      - docs/product/
      - docs/governance/
      - docs/reference/
      - docs/explanation/
      - docs/how-to/
      - docs/tutorials/
      - skills/README.md
      - templates/README.md
      - routes/
      - tools/
      - README.md
      - PROJECT_MAP.md
      - AGENTS.md
      - STATUS.md
    after_completion:
      auto_continue_allowed: false
      on_success: "说明治理规则改在哪里、索引是否同步、检查是否通过，以及本地 commit 和小扫地结果；不自动推送。"
      on_waiting_human: "涉及大迁移、删除旧文档、混合工作区无法安全拆分或远端发布动作时停下确认。"
      on_blocked: "说明孤岛文档、索引冲突、根目录散落或链接检查失败点。"
      suggested_user_replies:
        - "继续本地完善"
        - "给我看改动清单"
        - "给我看本轮 commit"
