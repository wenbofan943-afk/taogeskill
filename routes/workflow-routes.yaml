schema_version: 0.1
status: draft
owner: agent-orchestration
description: >
  Machine-readable workflow route map. This file is the next layer after
  docs/governance/agent-orchestration/required-reads.yaml and is intended
  to become the validator-readable task routing source.

defaults:
  project_root: "."
  project_map: PROJECT_MAP.md
  agent_rules: AGENTS.md
  state_index: state/current-state.yaml
  legacy_state_record: 工作流状态记录.md
  field_dictionary: 交接物字段词典.md

routes:
  content_run:
    intent_examples:
      - 做一篇内容
      - 跑生产逻辑
      - 给这个账号做内容
    build_profile: dev
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - state/current-state.yaml
      - 工作流状态记录.md
      - 交接物字段词典.md
      - skills/propagation-router/SKILL.md
    gates:
      - human_account_confirm
      - human_topic_select
      - field_gate
    writes:
      - accounts/{account_slug}/runs/{session_id}/
      - 工作流状态记录.md
    next_default: route_by_propagation_router

  account_onboarding:
    intent_examples:
      - 新建账号
      - 没有账号
      - 新增账号
    build_profile: dev
    required_reads:
      - skills/account-onboarding/SKILL.md
      - docs/reference/账号档案完整性检查表.md
    gates:
      - human_account_confirm
    writes:
      - accounts/{account_slug}/account_profile.md
      - accounts/{account_slug}/README.md
      - accounts/{account_slug}/index.md

  resume_run:
    intent_examples:
      - 继续
      - 接着上次
      - 活了吗
      - 断点续跑
    build_profile: dev
    required_reads:
      - state/current-state.yaml
      - 工作流状态记录.md
      - docs/reference/R2-运行模型执行规范.md
      - docs/governance/agent-orchestration/state-and-gates.md
    gates:
      - state_consistency_gate
    writes:
      - 工作流状态记录.md

  multi_branch_run:
    intent_examples:
      - 三篇都做
      - 这几个选题都跑
      - 多个一起做
    build_profile: dev
    required_reads:
      - docs/reference/R2-运行模型执行规范.md
      - docs/governance/agent-orchestration/state-and-gates.md
      - 工作流状态记录.md
    gates:
      - branch_lock_gate
      - fan_in_gate
    writes:
      - accounts/{account_slug}/runs/{parent_session_id}/
      - accounts/{account_slug}/runs/{child_session_id}/

  revision_run:
    intent_examples:
      - 改文案
      - 加画中画
      - 改标题
      - 导出转交包
    build_profile: dev
    required_reads:
      - state/current-state.yaml
      - docs/governance/agent-orchestration/state-and-gates.md
      - accounts/{account_slug}/runs/{session_id}/manifest.yaml
    gates:
      - revision_scope_gate
    writes:
      - accounts/{account_slug}/runs/{session_id}/intermediate/
      - accounts/{account_slug}/runs/{session_id}/deliverables/

  product_definition:
    intent_examples:
      - 产品开发
      - 继续 R1
      - 继续 P1-P5
      - 设计产品
    build_profile: dev
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - docs/product/GitHub开源上线前Workflow修复路线图.md
      - docs/governance/agent-orchestration/task-routing.md
    gates:
      - human_product_confirm
      - field_gate
    writes:
      - docs/product/
      - 工作流状态记录.md

  skill_compile:
    intent_examples:
      - skill 编译
      - 代码开发
      - 进入开发
    build_profile: dev
    required_reads:
      - 交接物字段词典.md
      - docs/reference/skill_contract模板.md
      - docs/governance/agent-orchestration/state-and-gates.md
    gates:
      - product_confirmed_gate
      - field_gate
    writes:
      - skills/
      - tools/

  test_run:
    intent_examples:
      - 测试
      - dry-run
      - 跑 sample
    build_profile: test
    required_reads:
      - routes/build-profiles.yaml
      - tools/README.md
      - examples/README.md
    gates:
      - sample_only_gate
    writes:
      - examples/
      - docs/tutorials/

  github_release:
    intent_examples:
      - 发版
      - GitHub 发布
      - 构建公开包
    build_profile: public
    required_reads:
      - routes/build-profiles.yaml
      - docs/governance/agent-orchestration/state-and-gates.md
      - release-checklist.md
      - RELEASE_NOTES.md
      - tools/validate-release-gate.ps1
    gates:
      - public_privacy_gate
      - remote_release_gate
      - human_release_approval
    writes:
      - releases/v{version}/
      - CHANGELOG.md
      - RELEASE_NOTES.md
      - 工作流状态记录.md

  dependency_research:
    intent_examples:
      - 调研成熟项目
      - 对标 dbskill
      - 看看别人怎么做
      - 方法论研究
    build_profile: dev
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - docs/governance/agent-orchestration/task-routing.md
      - docs/reference/文档治理与目录规范.md
    gates:
      - source_quality_gate
      - citation_gate
    writes:
      - docs/explanation/
      - docs/product/
      - 工作流状态记录.md

  privacy_audit:
    intent_examples:
      - 查一下有没有污染
      - 隐私审计
      - 真实账号有没有混进去
      - source zip 审计
      - token 有没有问题
    build_profile: public
    required_reads:
      - routes/build-profiles.yaml
      - docs/governance/agent-orchestration/build-profiles.md
      - SECURITY.md
      - tools/validate-public-release.ps1
      - tools/validate-release-gate.ps1
    gates:
      - public_privacy_gate
      - source_zip_gate
      - token_scope_gate
    writes:
      - releases/v{version}/
      - 工作流状态记录.md

  repo_maintenance:
    intent_examples:
      - git 对齐
      - tag 冲突吗
      - Actions 红了吗
      - 本地远端一致吗
      - GitHub 页面有没有问题
    build_profile: dev
    required_reads:
      - docs/governance/agent-orchestration/state-and-gates.md
      - docs/reference/版本治理与Git边界.md
      - release-checklist.md
    gates:
      - clean_worktree_gate
      - remote_state_gate
      - tag_semantics_gate
      - github_actions_gate
    writes:
      - 工作流状态记录.md

  package_distribution:
    intent_examples:
      - 构建测试包
      - 给别人测试的包
      - 离线包
      - 外部 tester 包
    build_profile: test
    required_reads:
      - routes/build-profiles.yaml
      - INSTALL.md
      - UPDATE.md
      - docs/how-to/export-support-log.md
      - tools/README.md
    gates:
      - sample_only_gate
      - package_manifest_gate
      - support_log_instruction_gate
    writes:
      - offline_tester_packages/
      - releases/v{version}/
      - 工作流状态记录.md

  issue_triage:
    intent_examples:
      - 用户反馈
      - issue 处理
      - 把反馈沉淀成问题包
      - 改版问题
    build_profile: dev
    required_reads:
      - docs/how-to/export-support-log.md
      - docs/explanation/工作流问题包与产品设计草案-20260706.md
      - docs/product/GitHub开源上线前Workflow修复路线图.md
      - support-logs/
    gates:
      - content_detail_permission_gate
      - issue_classification_gate
      - product_backlog_gate
    writes:
      - docs/product/
      - docs/explanation/
      - 工作流状态记录.md

  support_log:
    intent_examples:
      - 导出日志
      - 反馈日志
      - 不好用
    build_profile: dev
    required_reads:
      - docs/how-to/export-support-log.md
      - tools/export-support-log.ps1
    gates:
      - content_detail_permission_gate
    writes:
      - support-logs/

  docs_governance:
    intent_examples:
      - 文档治理
      - 目录治理
      - 文件太散
      - AI 驾驭工程编排
    build_profile: dev
    required_reads:
      - docs/reference/文档治理与目录规范.md
      - docs/governance/agent-orchestration/README.md
      - PROJECT_MAP.md
    gates:
      - link_check_gate
      - root_cleanliness_gate
    writes:
      - docs/governance/
      - docs/reference/
      - routes/
      - PROJECT_MAP.md
      - AGENTS.md
