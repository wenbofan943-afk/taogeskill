schema_id: taoge://registries/r7/task-guidance/v0.2
schema_version: 0.2
registry_id: r7-task-guidance-registry-v0.2
status: active_h6a
nodes:
  - node_id: hotspot_research
    business_objective: Execute the current versioned hotspot request and submit one complete research set without collapsing signal, event, candidate and topic identities.
    decision_boundaries: [Read only the current ready research request, Submit exactly one hotspot research set, Keep fact propagation and risk statuses separate, Do not infer scope from chat text]
  - node_id: topic_human_gate
    business_objective: Record one immutable human topic decision against the current panel without changing the panel or its topic components.
    decision_boundaries: [Use only registered topic actions, Do not rewrite ranking or evidence, Multi-select routes to the existing R2 branch flow, Manual URLs require a recorded input set]
  - node_id: hotspot_content_brief
    business_objective: Compile one content brief from the current selected topic source and the current account snapshot.
    decision_boundaries: [Consume only ready_for_brief selected source, Preserve evidence expression limits, Route next to structure planning, Do not read research Markdown or choose another topic]
  - node_id: hotspot_structure_plan
    business_objective: Design the short-video structure before drafting from the current hotspot brief and selected source.
    decision_boundaries: [Use design_before_draft, Do not reference a future draft or beat map, Preserve selected topic identity and evidence boundaries]
  - node_id: hotspot_draft
    business_objective: Generate the spoken script from the current hotspot brief and current approved structure.
    decision_boundaries: [Use generate_from_structure, Bind the current brief and structure, Do not upgrade unsupported claims, Keep the selected source as content source]
  - node_id: delivery_topic_freshness_review
    business_objective: Revalidate the selected topic immediately before delivery without reranking or changing the topic.
    decision_boundaries: [Record external attempts first, Do not advance when freshness is not assessed, Keep semantic and monitoring changes separate]
  - node_id: delivery_topic_freshness_apply
    business_objective: Apply one completed freshness review as a new immutable selected-source revision, then either continue delivery or request a versioned replan.
    decision_boundaries: [Monitoring-only updates preserve semantic digest, Material updates restart from hotspot brief, Reversal or identity change restarts from research, Commit source revision before activating a replan]
  - node_id: direct_content_intake
    business_objective: Bind the user-supplied draft to the confirmed account and preserve its original wording as the direct-delivery source.
    decision_boundaries: [Do not run hotspot research, Do not rewrite the supplied draft, Do not invent evidence for claims]
  - node_id: content_brief
    business_objective: Translate the current content source and account snapshot into one actionable content brief.
    decision_boundaries: [Preserve the supplied point of view, Keep unverified claims explicit, Do not change the target account]
  - node_id: direct_baseline_draft
    business_objective: Materialize the user-supplied script as an immutable baseline draft without changing its meaning.
    decision_boundaries: [Only normalize deterministic formatting, Preserve the original normalized digest, Do not bind a structure plan that does not exist yet]
  - node_id: semantic_beat_map
    business_objective: Reconstruct the complete semantics of the baseline draft before any structure diagnosis.
    decision_boundaries: [Use mapping_phase semantic_only, Leave structure_plan_ref and every stage_id empty, Cover the complete draft without invented future references]
  - node_id: direct_structure_plan
    business_objective: Diagnose the existing baseline draft from its materialized semantic beat map and select a structure without silently rewriting it.
    decision_boundaries: [Bind only the current draft and current semantic-only beat map, Require authorization before structural rewrite, Preserve the original draft when keep-current is valid]
  - node_id: structure_plan
    business_objective: Diagnose the supplied script structure and select a short-video structure mode without silently rewriting it.
    decision_boundaries: [Use content depth rather than a fixed duration, Require authorization before structural rewrite, Preserve the original draft when keep-current is valid]
  - node_id: draft
    business_objective: Materialize the current spoken-script revision under the approved structure decision.
    decision_boundaries: [Do not perform an unauthorized structural rewrite, Preserve source lineage, Do not remove warnings by editing claims silently]
  - node_id: content_beat_map
    business_objective: Cover the complete current draft with ordered semantic beats for review and visual analysis.
    decision_boundaries: [Use complete non-overlapping text coverage, Do not omit difficult claims, Keep byte and text boundaries verifiable]
  - node_id: script_review
    business_objective: Review spoken delivery, structure, claim risk and audience comprehension for the current draft.
    decision_boundaries: [Separate advisory issues from blockers, Do not overwrite the draft, Respect prior user decisions]
  - node_id: content_revision_gate
    business_objective: Record whether the current draft is kept or a specific revision is authorized.
    decision_boundaries: [Do not convert advice into authorization, Reuse an already explicit user decision, Stop only for a real unresolved content choice]
  - node_id: visual_need_analysis
    business_objective: Decide zero-to-N visual inserts from attention, understanding, evidence, demonstration, emotion or memory value.
    decision_boundaries: [No fixed image count, Every accepted visual must prove viewer value, Unverified statistics cannot be amplified as evidence]
  - node_id: visual_production
    business_objective: "Materialize every accepted visual task by its exclusive source class: real evidence capture, explicitly authorized existing asset, or Image 2 generated-context base."
    decision_boundaries: [Reconcile existing external outcomes first, Production-chain authorization covers all accepted Image 2 tasks, Never replace an unavailable generated-context base with deterministic SVG, Preserve task-to-asset hashes]
  - node_id: script_visual_alignment
    business_objective: Verify that each visual occurrence matches the current script beat and improves the intended viewer outcome.
    decision_boundaries: [Do not treat file existence as quality, Route script and visual defects to their owning producer, Preserve explicit warnings]
  - node_id: platform_package
    business_objective: Produce Douyin-primary packaging with Xiaohongshu and WeChat Channels adaptations from the current script and account profile.
    decision_boundaries: [Do not invent platform publication, Keep cover title and video title roles distinct, Preserve account voice]
  - node_id: cover_design
    business_objective: Compile platform-specific portrait cover renditions using the account visual identity and current packaging.
    decision_boundaries: [Do not hard-crop landscape artwork into a portrait cover, Require hash-bound raster review per rendition, Do not claim real platform preview]
  - node_id: delivery_candidate_compile
    business_objective: Deterministically assemble the current delivery candidate from committed artifacts, assets, reviews and registered actions.
    decision_boundaries: [No agent-authored candidate payload, No unregistered action code, Fail before render when bindings are stale]
  - node_id: final_delivery_render
    business_objective: Render the typed candidate into synchronized delivery views and an immutable delivery revision.
    decision_boundaries: [Do not mutate upstream content, Bind template and input digests, Do not mark complete without receipt and lineage]
  - node_id: viewport_acceptance
    business_objective: Measure desktop and mobile HTML layout and preserve reproducible visual evidence.
    decision_boundaries: [Screenshot existence is not layout proof, DOM measurement and visual observation are separate, Missing browser capability must remain not-tested]
  - node_id: final_human_gate
    business_objective: Present the current final delivery for the user's business acceptance or scoped revision request.
    decision_boundaries: [Do not auto-publish, Materialize one typed request with one-to-many atomic change items, Restart from the earliest owning producer, Preserve old HTML and rebuild candidate viewport and human gate, Normal human acceptance does not reduce autonomy]
