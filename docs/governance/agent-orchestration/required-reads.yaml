schema_version: 0.1
status: draft
owner: agent-orchestration
description: >
  Machine-readable required-read map for project-level AI orchestration.
  This draft mirrors task-routing.md and can later be compiled into validators.

tasks:
  content_run:
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - 工作流状态记录.md
      - 交接物字段词典.md
      - skills/propagation-router/SKILL.md
    gates:
      - human_account_confirm
      - human_topic_select
      - field_gate

  account_onboarding:
    required_reads:
      - skills/account-onboarding/SKILL.md
      - docs/reference/账号档案完整性检查表.md
    gates:
      - human_account_confirm

  resume_run:
    required_reads:
      - 工作流状态记录.md
      - docs/reference/R2-运行模型执行规范.md
      - docs/governance/agent-orchestration/state-and-gates.md
    gates:
      - state_consistency_gate

  product_definition:
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - docs/product/GitHub开源上线前Workflow修复路线图.md
      - docs/governance/agent-orchestration/task-routing.md
    gates:
      - human_product_confirm
      - field_gate

  skill_compile:
    required_reads:
      - 交接物字段词典.md
      - docs/reference/skill_contract模板.md
      - docs/governance/agent-orchestration/state-and-gates.md
    gates:
      - product_confirmed_gate
      - field_gate

  test_run:
    required_reads:
      - docs/governance/agent-orchestration/build-profiles.md
      - tools/README.md
      - examples/README.md
    gates:
      - sample_only_gate

  github_release:
    required_reads:
      - docs/governance/agent-orchestration/build-profiles.md
      - docs/governance/agent-orchestration/state-and-gates.md
      - release-checklist.md
      - RELEASE_NOTES.md
      - tools/validate-release-gate.ps1
    gates:
      - public_privacy_gate
      - remote_release_gate
      - human_release_approval

  dependency_research:
    required_reads:
      - AGENTS.md
      - PROJECT_MAP.md
      - docs/governance/agent-orchestration/task-routing.md
      - docs/reference/文档治理与目录规范.md
    gates:
      - source_quality_gate
      - citation_gate

  privacy_audit:
    required_reads:
      - routes/build-profiles.yaml
      - docs/governance/agent-orchestration/build-profiles.md
      - SECURITY.md
      - tools/validate-public-release.ps1
      - tools/validate-release-gate.ps1
    gates:
      - public_privacy_gate
      - source_zip_gate
      - token_scope_gate

  repo_maintenance:
    required_reads:
      - docs/governance/agent-orchestration/state-and-gates.md
      - docs/reference/版本治理与Git边界.md
      - release-checklist.md
    gates:
      - clean_worktree_gate
      - remote_state_gate
      - tag_semantics_gate
      - github_actions_gate
      - git_publish_gate

  package_distribution:
    required_reads:
      - routes/build-profiles.yaml
      - INSTALL.md
      - UPDATE.md
      - docs/how-to/export-support-log.md
      - tools/README.md
    gates:
      - sample_only_gate
      - package_manifest_gate
      - support_log_instruction_gate

  issue_triage:
    required_reads:
      - docs/how-to/export-support-log.md
      - docs/explanation/工作流问题包与产品设计草案-20260706.md
      - docs/product/GitHub开源上线前Workflow修复路线图.md
    gates:
      - content_detail_permission_gate
      - issue_classification_gate
      - product_backlog_gate

  support_log:
    required_reads:
      - docs/how-to/export-support-log.md
      - tools/export-support-log.ps1
    gates:
      - content_detail_permission_gate

  docs_governance:
    required_reads:
      - docs/reference/文档治理与目录规范.md
      - docs/governance/agent-orchestration/README.md
      - docs/governance/agent-orchestration/after-task-guidance.md
      - PROJECT_MAP.md
    gates:
      - link_check_gate
      - root_cleanliness_gate
