schema_version: public-entry-document-review.v0.1
contract_id: public_entry_document_review
owner: release_governance
current_release_version: 0.1.0-alpha.7
homepage_role: current_public_landing_only
release_blocking: true

policy:
  required_review_statuses:
    - reviewed_updated
    - reviewed_no_change
  historical_contract_policy: link_to_explanation_or_git_history
  review_rule: Every public entry document must be explicitly reviewed for the candidate version before a public build or GitHub release.

entry_documents:
  - path: README.md
    review_status: reviewed_updated
    review_reason: Updated for Alpha.7 while preserving the short public landing-page role and honest L2.8 boundary.
    required_tokens:
      - 0.1.0-alpha.7
      - Alpha 预发行提醒
      - ai-reading-boundary
    forbidden_tokens:
      - v1.9.1
      - 公开互动分析工具
      - 当前先不包装、不建独立仓库
      - PowerShell 7 为推荐宿主
  - path: INSTALL.md
    review_status: reviewed_updated
    review_reason: Updated package, tag and ZIP names for Alpha.7; PS5.1 installation boundary remains unchanged.
    required_tokens:
      - 0.1.0-alpha.7
    forbidden_tokens:
      - PowerShell 7 为推荐宿主
  - path: UPDATE.md
    review_status: reviewed_updated
    review_reason: Updated Alpha.6-to-Alpha.7 migration checks while preserving private-production-area safeguards.
    required_tokens:
      - 0.1.0-alpha.7
  - path: RELEASE_NOTES.md
    review_status: reviewed_updated
    review_reason: Added the Alpha.7 R6/R7/runtime-control scope and explicit L2.8 limitations.
    required_tokens:
      - 0.1.0-alpha.7
  - path: CHANGELOG.md
    review_status: reviewed_updated
    review_reason: Added the Alpha.7 capability, fix and known-limit summary.
    required_tokens:
      - 0.1.0-alpha.7
  - path: STATUS.md
    review_status: reviewed_updated
    review_reason: Updated the public/candidate boundary for the explicitly authorized Alpha.7 release.
    required_tokens:
      - alpha.7
  - path: PROJECT_MAP.md
    review_status: reviewed_no_change
    review_reason: Project navigation remains correct after the homepage was slimmed; detailed route material stays outside the public landing page.
  - path: NOTICE.md
    review_status: reviewed_no_change
    review_reason: Open-source boundary and attribution language remain current and are intentionally concise.
  - path: docs/product/R4-产品总览.md
    review_status: reviewed_updated
    review_reason: Current Windows support contract is explicitly limited to the PowerShell 5.1 baseline; historical PS7 evidence is not a current product claim.
    required_tokens:
      - PowerShell 7 不作为推荐
    forbidden_tokens:
      - PowerShell 7 为推荐宿主
