name: Public Release Candidate Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-public-candidate:
    name: Validate public candidate
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node for viewport validation
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Provision Playwright viewport capability
        shell: powershell
        run: |
          $playwrightRoot = Join-Path $env:RUNNER_TEMP 'taoge-playwright'
          $browserRoot = Join-Path $env:RUNNER_TEMP 'taoge-playwright-browsers'
          New-Item -ItemType Directory -Path $playwrightRoot -Force | Out-Null
          npm install --prefix $playwrightRoot --no-audit --no-fund --ignore-scripts playwright@1.58.0
          if ($LASTEXITCODE -ne 0) { throw "playwright_package_install_failed:$LASTEXITCODE" }
          $env:PLAYWRIGHT_BROWSERS_PATH = $browserRoot
          & (Join-Path $playwrightRoot 'node_modules\.bin\playwright.cmd') install chromium
          if ($LASTEXITCODE -ne 0) { throw "playwright_browser_install_failed:$LASTEXITCODE" }
          $nodePath = Join-Path $playwrightRoot 'node_modules'
          $environmentLines = "NODE_PATH=$nodePath`nPLAYWRIGHT_BROWSERS_PATH=$browserRoot`n"
          [IO.File]::AppendAllText($env:GITHUB_ENV, $environmentLines, [Text.UTF8Encoding]::new($false))

      - name: Validate final delivery template
        shell: powershell
        run: .\tools\validate-final-delivery-template.ps1

      - name: Validate cover composition sample
        shell: powershell
        run: .\tools\validate-cover-composition.ps1

      - name: Validate R3 visual text fixtures
        shell: powershell
        run: .\tools\validate-r3-visual-text.ps1

      - name: Validate R3 visual presentation fixtures
        shell: powershell
        run: .\tools\validate-r3-visual-presentation.ps1

      - name: Validate P0 H7 v0.4 delivery fixtures
        shell: powershell
        run: .\tools\validate-p0-h7-v04-fixtures.ps1

      - name: Validate regression suite
        shell: powershell
        run: .\tools\validate-regression-suite.ps1 -SuitePath .\examples\regression-suite.yaml

      - name: Run Windows clean-room matrix
        shell: powershell
        run: .\tools\invoke-windows-clean-room-matrix.ps1 -Mode full -WindowsPowerShellPath (Get-Command powershell.exe).Source

      - name: Upload Windows matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-matrix-${{ github.job }}-${{ runner.arch }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            state/checks/windows-clean-room-matrix-report.*
            state/checks/h5m/build.*.txt
            state/checks/h5m/**/result.json
            state/checks/h5m/**/case.*.txt
            state/checks/h5m/**/reports/*.txt
            state/checks/h5m/**/reports/*.json

      - name: Build public release candidate
        shell: powershell
        run: .\tools\build-public-release.ps1

      - name: Validate public release candidate
        shell: powershell
        run: .\tools\validate-public-release.ps1

      - name: Validate Git source boundary
        shell: powershell
        run: .\tools\validate-release-gate.ps1

  certify-windows-hosted-platforms:
    name: Certify ${{ matrix.axis }} on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            axis: windows_server
          - runner: windows-2025
            axis: windows_server
          - runner: windows-11-arm
            axis: windows_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node for viewport validation
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Provision Playwright viewport capability
        shell: powershell
        run: |
          $playwrightRoot = Join-Path $env:RUNNER_TEMP 'taoge-playwright'
          $browserRoot = Join-Path $env:RUNNER_TEMP 'taoge-playwright-browsers'
          New-Item -ItemType Directory -Path $playwrightRoot -Force | Out-Null
          npm install --prefix $playwrightRoot --no-audit --no-fund --ignore-scripts playwright@1.58.0
          if ($LASTEXITCODE -ne 0) { throw "playwright_package_install_failed:$LASTEXITCODE" }
          $env:PLAYWRIGHT_BROWSERS_PATH = $browserRoot
          & (Join-Path $playwrightRoot 'node_modules\.bin\playwright.cmd') install chromium
          if ($LASTEXITCODE -ne 0) { throw "playwright_browser_install_failed:$LASTEXITCODE" }
          $nodePath = Join-Path $playwrightRoot 'node_modules'
          $environmentLines = "NODE_PATH=$nodePath`nPLAYWRIGHT_BROWSERS_PATH=$browserRoot`n"
          [IO.File]::AppendAllText($env:GITHUB_ENV, $environmentLines, [Text.UTF8Encoding]::new($false))

      - name: Verify runner environment
        shell: powershell
        run: .\tools\invoke-windows-certification-probe.ps1 -TargetRoot $env:RUNNER_TEMP -RequiredAxis '${{ matrix.axis }}' -ProbeWrite

      - name: Validate certification classifier
        shell: powershell
        run: .\tools\validate-windows-certification.ps1

      - name: Run full Windows clean-room matrix
        shell: powershell
        run: .\tools\invoke-windows-clean-room-matrix.ps1 -Mode full -WindowsPowerShellPath (Get-Command powershell.exe).Source

      - name: Upload Windows matrix diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-matrix-${{ matrix.runner }}-${{ runner.arch }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            state/checks/windows-clean-room-matrix-report.*
            state/checks/h5m/build.*.txt
            state/checks/h5m/**/result.json
            state/checks/h5m/**/case.*.txt
            state/checks/h5m/**/reports/*.txt
            state/checks/h5m/**/reports/*.json

      - name: Build public release candidate
        shell: powershell
        run: .\tools\build-public-release.ps1

      - name: Validate public release candidate
        shell: powershell
        run: .\tools\validate-public-release.ps1
