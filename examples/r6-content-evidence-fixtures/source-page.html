<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公开资料示例</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #eef2f7; color: #172033; font-family: "Microsoft YaHei", sans-serif; }
    header { height: 110px; padding: 30px 100px; color: white; background: #2457d6; font-size: 30px; font-weight: 700; }
    main { margin: 50px 100px; padding: 42px 54px; background: white; border-radius: 24px; box-shadow: 0 16px 50px rgba(25,40,80,.12); }
    .meta { color: #667085; font-size: 20px; }
    h1 { margin: 22px 0 36px; font-size: 44px; }
    #evidence { padding: 36px; border-left: 12px solid #c1440e; background: #fff7ed; font-size: 34px; line-height: 1.7; }
    strong { color: #c1440e; font-size: 54px; }
    footer { margin-top: 34px; color: #667085; font-size: 20px; }
  </style>
</head>
<body>
  <header>示例研究机构 · 公开资料</header>
  <main>
    <div class="meta">发布日期：2026-07-01 · 本页面仅用于公开防回归 fixture</div>
    <h1>指标定义与示例结果</h1>
    <section id="evidence">在统一的示例口径下，样本指标结果为 <strong>42</strong>。该数字只用于验证来源截图、绑定与分层排版，不能外推为任何真实行业结论。</section>
    <footer>来源标识、页面标题、发布日期和选中片段均在视口内可见。</footer>
  </main>
</body>
</html>
