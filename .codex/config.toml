# Project defaults. Explicit user selections in Codex take precedence.
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"

[agents.content_operator]
description = "Run normal content production and revision workflows."
config_file = "agents/content-operator.config.toml"

[agents.product_architect]
description = "Define products, research mature workflows, and resolve architecture tradeoffs."
config_file = "agents/product-architect.config.toml"

[agents.skill_compiler]
description = "Compile approved product contracts into Skills, tools, templates, and validators."
config_file = "agents/skill-compiler.config.toml"

[agents.release_auditor]
description = "Perform privacy, release, lineage, and final regression audits."
config_file = "agents/release-auditor.config.toml"

[agents.maintenance_operator]
description = "Handle bounded mechanical maintenance, indexing, and support-log tasks."
config_file = "agents/maintenance-operator.config.toml"
